name: Build executables

# PyInstaller cannot cross-compile, so each OS builds its own binary on its own runner.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.tag }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            tag: windows
          - os: ubuntu-latest
            tag: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (with build group)
        run: uv sync --group build

      - name: Build executable
        run: uv run --group build python build.py --zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alphafarm-${{ matrix.tag }}
          path: |
            dist/alphafarm-${{ matrix.tag }}.zip
            dist/alphafarm-${{ matrix.tag }}.tar.gz
          if-no-files-found: error

  # When triggered by a version tag, gather both binaries into a GitHub Release.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
